<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Trading Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  padding: 15px;
}

h1 {
  text-align: center;
}

.card {
  background: #1c2438;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.chart {
  height: 200px;
  background: black;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.bar {
  width: 4px;
  position: absolute;
  bottom: 0;
}

.green { background: lime; }
.red { background: red; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
}

.btn-green { background: #34d399; }
.btn-blue { background: #38bdf8; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

#online {
  font-size: 14px;
  color: #9ca3af;
}
</style>

</head>

<body>

<div class="container">

<h1>📈 Signal Trading Pro</h1>
<p id="online">👥 User online: 120</p>

<div class="card">
  <div class="chart" id="chart"></div>
</div>

<div class="card">
  <h2>🔒 VIP Signal</h2>
  <p>Signal akurat + entry lengkap</p>
  <button class="btn-green" onclick="joinVIP()">Join VIP</button>
</div>

<div class="card">
  <h2>Login VIP</h2>
  <input type="text" id="vipCode" placeholder="Masukkan kode VIP">
  <button class="btn-blue" onclick="loginVIP()">Login</button>
</div>

<div class="card">
  <h2>🔥 Mulai Trading</h2>
  <p>Platform terpercaya</p>
  <button class="btn-green" onclick="goAjaib()">Daftar Sekarang</button>
</div>

<div class="card" id="signalBox" style="display:none;">
  <h2>📊 SIGNAL VIP</h2>
  <p id="signalText">Menunggu signal...</p>
</div>

</div>

<script>
// ================= CHART =================
const chart = document.getElementById("chart");

function generateChart() {
  chart.innerHTML = "";
  for (let i = 0; i < 60; i++) {
    let bar = document.createElement("div");
    let height = Math.random() * 100;

    bar.className = "bar " + (Math.random() > 0.5 ? "green" : "red");
    bar.style.height = height + "%";
    bar.style.left = (i * 5) + "px";

    chart.appendChild(bar);
  }
}
setInterval(generateChart, 2000);

// ================= ONLINE USER FAKE =================
setInterval(() => {
  let online = 100 + Math.floor(Math.random() * 100);
  document.getElementById("online").innerText = "👥 User online: " + online;
}, 3000);

// ================= VIP LOGIN =================
window.onload = function(){
  if(localStorage.getItem("vip") === "true"){
    document.getElementById("signalBox").style.display = "block";
    startSignal();
  }
}

function loginVIP(){
  let code = document.getElementById("vipCode").value;

  if(code === "VIP123"){
    localStorage.setItem("vip", "true");
    alert("Login berhasil 🔥");
    document.getElementById("signalBox").style.display = "block";
    startSignal();
  } else {
    alert("Kode salah ❌");
  }
}

// ================= SIGNAL =================
function startSignal(){
  setInterval(() => {
    let arah = Math.random() > 0.5 ? "BUY" : "SELL";
    let pair = ["BTC/USDT","ETH/USDT","XAUUSD"];
    let randomPair = pair[Math.floor(Math.random()*pair.length)];

    let text = `
${arah} ${randomPair}
Entry: ${(Math.random()*1000).toFixed(2)}
TP: +${(Math.random()*50).toFixed(2)}
SL: -${(Math.random()*30).toFixed(2)}
`;

    document.getElementById("signalText").innerText = text;
  }, 3000);
}

// ================= BUTTON =================
function joinVIP(){
  window.location.href = "https://wa.me/6285624264725";
}

function goAjaib(){
  window.location.href = "https://ajaib.co.id/register?referral=okiftptw";
}
</script>

</body>
</html>

<script>
let isVIP = false;

function generateSignal() {
  let el = document.getElementById("signal");

  // loading AI
  el.innerHTML = "🤖 AI analyzing market...";
  
  setTimeout(() => {
    el.innerHTML = "BUY 🚀 (Strong Signal)";
    
    // munculin popup
    document.getElementById("popup").style.display = "block";
    
  }, 2000);
}
function claimBonus() {
  window.open("https://ajaib.co.id/register?referral=okiftptw", "_blank");
}
function loginVIP() {
  let code = document.getElementById("vipCode").value;

  if (code === "123VIP") {
    isVIP = true;
    showVIP();
  } else {
    alert("Kode salah!");
  }
}

function showVIP() {
  let entry = (Math.random()*1000).toFixed(2);
  let sl = (entry - 50).toFixed(2);
  let tp = (parseFloat(entry) + 100).toFixed(2);

  document.getElementById("vipSignal").innerHTML = `
  ✅ VIP SIGNAL<br>
  Entry: ${entry}<br>
  SL: ${sl}<br>
  TP: ${tp}
  `;
}

function joinVIP() {
  window.open("https://wa.me/6285624264725", "_blank");
}

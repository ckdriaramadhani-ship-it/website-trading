<!DOCTYPE html>
<html>
<head>
  <title>🚀 Pro Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      color: #38bdf8;
      font-size: 22px;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    .vip {
      background: #22c55e;
      color: black;
    }

    .signal {
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>🚀 Trading Signal Pro</header>

<div class="container">

  <!-- SIGNAL -->
  <div class="card">
    <h3>Signal Hari Ini</h3>
    <button onclick="generateSignal()">Generate Signal</button>
    <div id="signal" class="signal">Klik untuk analisa</div>
  </div>

  <!-- TESTIMONI -->
  <div class="card">
    <h3>Testimoni</h3>
    <p>🔥 “Profit 120$ dalam 2 hari!”</p>
    <p>🔥 “Signal akurat banget!”</p>
    <p>🔥 “Worth it join VIP!”</p>
  </div>

  <!-- CTA -->
  <div class="card">
    <h3>Join VIP Signal</h3>
    <p>Dapatkan signal lebih akurat + entry lengkap</p>
    <button class="vip" onclick="joinVIP()">Join VIP Sekarang</button>
  </div>

  <!-- AFFILIATE -->
  <div class="card">
    <h3>Mulai Trading</h3>
    <p>Daftar exchange & mulai trading sekarang</p>
    <button onclick="openExchange()">Daftar Sekarang</button>
  </div>

</div>

<script>
function generateSignal() {
  let signals = ["BUY 🚀", "SELL 🔻"];
  let result = signals[Math.floor(Math.random() * signals.length)];

  document.getElementById("signal").innerHTML = result;
}

function joinVIP() {
  alert("Hubungi WhatsApp: 08xxxxxxxxxx");
}

function openExchange() {
  window.open("https://www.binance.com/", "_blank");
}
</script>

</body>
</html>

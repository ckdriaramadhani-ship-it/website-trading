<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Trading Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  padding: 15px;
}

.card {
  background: #1c2438;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

h1 {
  text-align: center;
}

.chart {
  height: 200px;
  background: linear-gradient(180deg,#111,#000);
  border-radius: 10px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}

.bar {
  width: 4px;
  background: lime;
  position: absolute;
  bottom: 0;
}

.red { background: red; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 10px;
}

.btn-green { background: #34d399; }
.btn-blue { background: #38bdf8; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>📈 Signal Trading Pro</h1>

<div class="card">
  <div class="chart" id="chart"></div>
</div>

<div class="card">
  <h2>🔒 VIP Signal</h2>
  <p>Signal lebih akurat + entry lengkap</p>
  <button class="btn-green" onclick="joinVIP()">Join VIP</button>
</div>

<div class="card">
  <h2>Login VIP</h2>
  <input type="text" id="vipCode" placeholder="Masukkan kode VIP">
  <button class="btn-blue" onclick="loginVIP()">Login</button>
</div>

<div class="card">
  <h2>🔥 Mulai Trading</h2>
  <p>Gunakan platform terpercaya</p>
  <button class="btn-green" onclick="goAjaib()">Daftar Ajaib</button>
</div>

<div class="card" id="signalBox" style="display:none;">
  <h2>📊 SIGNAL VIP</h2>
  <p id="signalText">Loading...</p>
</div>

</div>

<script>
// ================= CHART DUMMY =================
const chart = document.getElementById("chart");

function generateChart() {
  chart.innerHTML = "";
  for (let i = 0; i < 50; i++) {
    let bar = document.createElement("div");
    let height = Math.random() * 100;
    bar.className = "bar";
    if (Math.random() > 0.5) bar.classList.add("red");

    bar.style.height = height + "%";
    bar.style.left = (i * 6) + "px";

    chart.appendChild(bar);
  }
}
generateChart();

// ================= VIP =================
function joinVIP(){
  alert("Hubungi admin untuk join VIP 🚀");
}

function loginVIP(){
  let code = document.getElementById("vipCode").value;

  if(code === "VIP123"){
    alert("Login berhasil 🔥");
    document.getElementById("signalBox").style.display = "block";
    startSignal();
  } else {
    alert("Kode salah ❌");
  }
}

// ================= SIGNAL FAKE =================
function startSignal(){
  setInterval(() => {
    let arah = Math.random() > 0.5 ? "BUY" : "SELL";
    let pair = ["BTC/USDT","ETH/USDT","XAUUSD"];
    let randomPair = pair[Math.floor(Math.random()*pair.length)];

    let text = arah + " " + randomPair +
      " | Entry: " + (Math.random()*1000).toFixed(2) +
      " | TP: +" + (Math.random()*50).toFixed(2) +
      " | SL: -" + (Math.random()*30).toFixed(2);

    document.getElementById("signalText").innerText = text;
  }, 3000);
}

// ================= REFERRAL =================
function goAjaib(){
  window.location.href = "https://ajaib.co.id/register?referral=okiftptw";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Pro Trading Dashboard</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    color: #38bdf8;
    font-size: 22px;
    border-bottom: 1px solid #1e293b;
}

.container {
    padding: 15px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.signal {
    text-align: center;
    font-size: 20px;
    margin-top: 10px;
}

.buy { color: #22c55e; }
.sell { color: #ef4444; }

.balance {
    font-size: 18px;
    text-align: center;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<header>🚀 Pro Trading Dashboard</header>

<div class="container">

<div class="card">
<div class="balance">💰 Balance: $<span id="balance">1000</span></div>
</div>

<div class="card">
<label>Pilih Pair</label>
<select id="pair">
<option>BTC/USDT</option>
<option>ETH/USDT</option>
<option>GOLD</option>
</select>
</div>

<div class="card">
<div id="chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "width": "100%",
  "height": 300,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "1",
  "theme": "dark",
  "container_id": "chart"
});
</script>
</div>

<div class="card">
<h3>Signal Trading</h3>
<div id="status">Menunggu analisa...</div>
<button onclick="generateSignal()">Generate Signal</button>
<div id="result" class="signal"></div>
</div>

<div class="card">
<h3>Tips</h3>
<button onclick="showTips()">Tips Trading</button>
<div id="tips"></div>
</div>

</div>

<script>
let balance = 1000;

function generateSignal() {
    let status = document.getElementById("status");
    let result = document.getElementById("result");

    status.innerHTML = "Analyzing market...";
    result.innerHTML = "";

    setTimeout(() => {
        let signal = Math.random() > 0.5 ? "BUY" : "SELL";
        let entry = (Math.random() * 1000).toFixed(2);
        let sl = (entry - 50).toFixed(2);
        let tp = (parseFloat(entry) + 100).toFixed(2);

        let profit = Math.floor(Math.random() * 50);
        balance += profit;

        document.getElementById("balance").innerHTML = balance;

        result.className = "signal " + (signal === "BUY" ? "buy" : "sell");
        result.innerHTML = `
        ${signal} <br>
        Entry: ${entry} <br>
        SL: ${sl} <br>
        TP: ${tp} <br>
        Profit: +$${profit}
        `;

        status.innerHTML = "Signal siap!";
    }, 2000);
}

function showTips() {
    let tipsList = [
        "Gunakan risk management",
        "Jangan overtrade",
        "Ikuti trend market",
        "Gunakan stop loss",
        "Jangan FOMO"
    ];

    let random = tipsList[Math.floor(Math.random() * tipsList.length)];
    document.getElementById("tips").innerHTML = random;
}
</script>

</body>
</html>

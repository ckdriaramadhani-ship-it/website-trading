<!DOCTYPE html>
<html>
<head>
  <title>🚀 Pro Trading Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      color: #38bdf8;
      font-size: 22px;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .result {
      margin-top: 10px;
      text-align: center;
      font-size: 16px;
      color: #cbd5f5;
    }
  </style>
</head>

<body>

<header>🚀 Pro Trading Dashboard</header>

<div class="container">

  <!-- Pair -->
  <div class="card">
    <h3>Pilih Pair</h3>
    <select id="pair">
      <option>BTC/USDT</option>
      <option>ETH/USDT</option>
      <option>SOL/USDT</option>
      <option>XRP/USDT</option>
    </select>
  </div>

  <!-- Chart -->
  <div class="card">
    <h3>Chart</h3>
    <div id="tradingview_chart"></div>
  </div>

  <!-- Signal -->
  <div class="card">
    <h3>Signal Trading</h3>
    <button onclick="generateSignal()">Generate Signal</button>
    <div class="result" id="signal">Menunggu analisa...</div>
  </div>

  <!-- Tips -->
  <div class="card">
    <h3>Tips Trading</h3>
    <button onclick="showTips()">Tampilkan Tips</button>
    <div class="result" id="tips"></div>
  </div>

</div>

<!-- TradingView Script -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  new TradingView.widget({
    "width": "100%",
    "height": 300,
    "symbol": "BINANCE:BTCUSDT",
    "interval": "15",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "container_id": "tradingview_chart"
  });

  function generateSignal() {
    let signals = ["BUY 🚀", "SELL 🔻", "WAIT ⏳"];
    let random = signals[Math.floor(Math.random() * signals.length)];
    document.getElementById("signal").innerText = "Signal: " + random;
  }

  function showTips() {
    let tipsList = [
      "Gunakan risk management",
      "Jangan overtrade",
      "Ikuti trend market",
      "Gunakan stop loss",
      "Jangan FOMO"
    ];
    let random = tipsList[Math.floor(Math.random() * tipsList.length)];
    document.getElementById("tips").innerText = random;
  }
</script><script>
async function getPrice(pair) {
    try {
        let id = "bitcoin";

        if (pair === "ETH/USDT") id = "ethereum";
        if (pair === "BNB/USDT") id = "binancecoin";

        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
        const data = await res.json();

        return data[id].usd;
    } catch (err) {
        console.log("Error:", err);
        return null;
    }
}

async function generateSignal() {
    const pair = document.getElementById("pair").value;
    const price = await getPrice(pair);

    const output = document.getElementById("signal");

    if (!price) {
        output.innerHTML = "Gagal ambil data 😢";
        return;
    }

    // Logic sederhana (random + harga)
    let signalType = Math.random() > 0.5 ? "BUY 📈" : "SELL 📉";

    let sl = (price * 0.98).toFixed(2);
    let tp = (price * 1.02).toFixed(2);

    output.innerHTML = `
        <b>Pair:</b> ${pair}<br>
        <b>Harga:</b> $${price}<br>
        <b>Signal:</b> ${signalType}<br>
        <b>TP:</b> $${tp}<br>
        <b>SL:</b> $${sl}
    `;
}

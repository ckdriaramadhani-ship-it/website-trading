<!DOCTYPE html>

<html lang="id">
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6980651711047559"
     crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Trading Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#0b1220, #020617);
  color: white;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

#online {
  text-align: center;
  font-size: 14px;
  color: #9ca3af;
}

.card {
  background: #1c2438;
  border-radius: 15px;
  padding: 15px;
  margin-top: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.chart {
  height: 200px;
  background: black;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.bar {
  width: 4px;
  position: absolute;
  bottom: 0;
}

.green { background: #00ff9f; }
.red { background: #ff3b3b; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
}

.btn-green { background: #22c55e; }
.btn-blue { background: #0ea5e9; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

#signalText {
  white-space: pre-line;
  font-size: 15px;
}
</style>
<head>
  



<body>

<div class="container">

<h1>📈 Signal Trading Pro</h1>
<p id="online">👥 User online: 128</p>

<div class="card">
  <div class="chart" id="chart"></div>
</div>

<div class="card">
  <h2>🔒 VIP Signal</h2>
  <p>Signal akurat + entry lengkap + winrate tinggi</p>
  <button class="btn-green" onclick="joinVIP()">Join VIP</button>
</div>

<div class="card">
  <h2>Login VIP</h2>
  <input type="text" id="vipCode" placeholder="Masukkan kode VIP">
  <button class="btn-blue" onclick="loginVIP()">Login</button>
</div>
 
  <button class="btn-green" onclick="bayarVIP()">Bayar VIP (QRIS)</button>

<div class="card">
  <h2>🔥 Mulai Trading</h2>
  <p>Gunakan platform terpercaya</p>
  <button class="btn-green" onclick="goAjaib()">Daftar Sekarang</button>
</div>

<div class="card" id="signalBox" style="display:none;">
  <h2>📊 SIGNAL VIP</h2>
  <p id="signalText">Menunggu signal...</p>
</div>

</div>

<script>
// CHART
const chart = document.getElementById("chart");
function generateChart(){
  chart.innerHTML="";
  for(let i=0;i<60;i++){
    let bar=document.createElement("div");
    let h=Math.random()*100;
    bar.className="bar "+(Math.random()>0.5?"green":"red");
    bar.style.height=h+"%";
    bar.style.left=(i*5)+"px";
    chart.appendChild(bar);
  }
}
setInterval(generateChart,2000);

// ONLINE USER
setInterval(()=>{
  let n=100+Math.floor(Math.random()*100);
  document.getElementById("online").innerText="👥 User online: "+n;
},3000);

// LOGIN VIP
window.onload=function(){
  if(localStorage.getItem("vip")==="true"){
    document.getElementById("signalBox").style.display="block";
    startSignal();
  }
};

function loginVIP(){
  let code=document.getElementById("vipCode").value;
  if(code==="VIP123"){
    localStorage.setItem("vip","true");
    alert("Login berhasil 🔥");
    document.getElementById("signalBox").style.display="block";
    startSignal();
  }else{
    alert("Kode salah ❌");
  }
}

// SIGNAL
function startSignal(){
  setInterval(()=>{
    let arah=Math.random()>0.5?"BUY":"SELL";
    let pair=["BTC/USDT","ETH/USDT","XAUUSD"];
    let p=pair[Math.floor(Math.random()*pair.length)];

    let txt=
`${arah} ${p}
Entry: ${(Math.random()*1000).toFixed(2)}
TP: +${(Math.random()*50).toFixed(2)}
SL: -${(Math.random()*30).toFixed(2)}`;

    document.getElementById("signalText").innerText=txt;
  },3000);
}

// BUTTON
function joinVIP(){
  window.location.href="https://wa.me/6285624264725";
}

function goAjaib(){
  window.location.href="https://ajaib.co.id/register?referral=okiftptw";
}
</script>

</body>
</html>

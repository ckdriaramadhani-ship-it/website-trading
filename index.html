<!DOCTYPE html>
<html>
<head>
  <title>🚀 Trading Signal Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    .header {
      text-align: center;
      padding: 15px;
      border-bottom: 1px solid #1e293b;
    }

    .header h2 {
      margin: 0;
      color: #38bdf8;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(10px);}
      to {opacity:1; transform: translateY(0);}
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      margin-top: 10px;
      font-size: 15px;
    }

    .btn-signal {
      background: linear-gradient(45deg, #38bdf8, #0ea5e9);
      color: black;
    }

    .btn-profit {
      background: linear-gradient(45deg, #22c55e, #4ade80);
      color: black;
    }

    .profit {
      color: #22c55e;
      font-size: 20px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    iframe {
      max-width: 100%;
      border-radius: 10px;
    }

    /* POPUP */
    #popup {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0f172a;
      padding: 20px;
      text-align: center;
      border-top: 2px solid #38bdf8;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {transform: translateY(100%);}
      to {transform: translateY(0);}
    }

  </style>
</head>

<body>

<div class="header">
  <h2>🚀 Trading Signal Pro</h2>
  <p style="font-size:12px;color:gray;">Simple AI Trading Tools</p>
</div>

<div class="container">

  <!-- PROFIT -->
  <div class="card">
    <h3>💰 Profit Hari Ini</h3>
    <p id="profit" class="profit">+$0</p>
  </div>

  <!-- SIGNAL -->
  <div class="card">
    <h3>Signal Gratis</h3>
    <button class="btn btn-signal" onclick="generateSignal()">Generate Signal</button>
    <p id="result">Sisa 3x signal hari ini</p>
  </div>

  <!-- CHART -->
  <div class="card">
    <h3>📊 Live Chart</h3>
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15&theme=dark"
      width="100%" height="300">
    </iframe>
  </div>

  <!-- VIP -->
  <div class="card">
    <h3>VIP Signal 🔒</h3>
    <p>Signal lebih akurat + entry lengkap</p>
    <button class="btn btn-profit" onclick="joinVIP()">Join VIP</button>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <h3>Login VIP</h3>
    <input id="vipCode" placeholder="Masukkan kode VIP">
    <button class="btn btn-signal" onclick="loginVIP()">Login</button>
  </div>

  
!-- BONUS -->
  <div class="card">
    <h3>🔥 Mulai Trading</h3>
    <p>Gunakan platform terpercaya untuk pemula</p>
    <button class="btn btn-profit" onclick="goAjaib()">Daftar Ajaib</button>
  </div>


<script>

let signalLimit = 3;
let profit = 0;

// Profit naik (visual)
setInterval(() => {
  profit += Math.floor(Math.random()*7);
  document.getElementById("profit").innerText = "+$" + profit;
}, 2000);

// Popup auto
setTimeout(() => {
  document.getElementById("popup").style.display = "block";
}, 6000);

// Generate signal
function generateSignal() {

  if(signalLimit <= 0){
    document.getElementById("result").innerHTML = "❌ Limit habis (VIP only)";
    return;
  }

  signalLimit--;

  let el = document.getElementById("result");
  el.innerHTML = "🤖 AI analyzing...";

  setTimeout(() => {

    let r = Math.random();
    let signal = r > 0.6 ? "BUY 🚀" : (r < 0.4 ? "SELL 🔻" : "WAIT ⏳");

    el.innerHTML = signal + "<br>Sisa " + signalLimit + "x";

    document.getElementById("popup").style.display = "block";

  }, 2500);
}

// VIP login
function loginVIP(){
  let code = document.getElementById("vipCode").value;
  if(code === "VIP123"){
    alert("VIP aktif!");
    signalLimit = 999;
  } else {
    alert("Kode salah!");
  }
}

// WA VIP
function joinVIP(){
  window.open("https://wa.me/6285624264725");
}

// Ajaib referral
function goAjaib(){
  window.location.href = "https://ajaib.co.id/register?referral=okiftptw";
}

</script>

</body>
</html>
